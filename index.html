<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horst Ereignisse 2026</title>
<link rel="manifest" href="manifest.json">
<style>
body {font-family: system-ui, Arial; margin:0; background:#0f172a; color:white;}
header {text-align:center; padding:20px; font-size:26px;}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; padding:20px;}
.card {background:#111827; border-radius:20px; padding:20px; text-align:center; transition:.3s;}
.card.next {border:2px solid #22c55e; transform:scale(1.03);}
.card.warning {border:2px solid #ef4444; animation:pulse 1s infinite;}
.card.birthday {border:3px solid gold; box-shadow:0 0 20px gold;}
.card.pension {border:3px solid #38bdf8; box-shadow:0 0 25px #38bdf8;}
@keyframes pulse {0%{box-shadow:0 0 0px #ef4444;}50%{box-shadow:0 0 15px #ef4444;}100%{box-shadow:0 0 0px #ef4444;}}
.title {font-size:16px; margin-bottom:5px; opacity:.8;}
.datetime {font-size:13px; opacity:0.6; margin-bottom:10px;}
.emoji {font-size:28px; margin-bottom:10px;}
.digital {font-size:18px; font-weight:bold; padding:15px; border-radius:12px; line-height:1.4;}
</style>
</head>
<body>
<header>⏱ Horst Ereignisse 2026</header>
<div class="grid" id="grid"></div>

<script>
const colors=["#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7","#14b8a6"];

function getEmoji(name){
if(name.includes("Oster")) return "🐣";
if(name.includes("Live")) return "🎸";
if(name.includes("Kur")) return "🧘";
if(name.includes("Tennis")) return "🎾";
if(name.includes("Hochzeit")) return "💍";
if(name.includes("Italien")) return "🇮🇹";
if(name.includes("Rhodos")) return "🌴";
if(name.includes("Fest")) return "🎉";
if(name.includes("60er")) return "🎂";
if(name.includes("Pension")) return "🌅";
return "📅";
}

let events=[
{name:"Kinder Osterfeier",date:"2026-04-05T10:00:00"},
{name:"Familie Osterjause",date:"2026-04-05T15:00:00"},
{name:"Ostwärts Live",date:"2026-04-18T20:00:00"},
{name:"Silvia Kur",date:"2026-04-19T10:00:00"},
{name:"Tenniscamp Umag",date:"2026-04-29T16:00:00"},
{name:"Hochzeit Albanien",date:"2026-06-11T00:00:00"},
{name:"Urlaub Italien",date:"2026-07-13T00:00:00"},
{name:"Fest SC Piesting",date:"2026-09-05T09:00:00"},
{name:"Urlaub Rhodos",date:"2026-09-13T04:50:00"},
{name:"🎂 Horst 60er",date:"2026-12-18T00:00:00"},
{name:"🌅 Horst frühester Pensionsantritt",date:"2029-01-01T00:00:00"}
];

const grid=document.getElementById("grid");

function formatDate(dateStr){
return new Date(dateStr).toLocaleString("de-AT");
}

function sortEvents(){
events.sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function render(){
grid.innerHTML="";
sortEvents();

events.forEach((event,i)=>{
const color=colors[i%colors.length];
const div=document.createElement("div");
div.className="card";
div.id="card"+i;

if(event.name.includes("60er")) div.classList.add("birthday");
if(event.name.includes("Pension")) div.classList.add("pension");

const emoji=getEmoji(event.name);

div.innerHTML=`
<div class="emoji">${emoji}</div>
<div class="title">${event.name}</div>
<div class="datetime">${formatDate(event.date)}</div>
<div class="digital" id="digital${i}" style="background:${color}"></div>
`;

grid.appendChild(div);
});
}

function update(){
const now=new Date();

events.forEach((event,i)=>{
const target=new Date(event.date);
let diff=target-now;

const digital=document.getElementById("digital"+i);
const card=document.getElementById("card"+i);

card.classList.remove("next","warning");

if(diff<=0){
digital.innerHTML="🎉 Jetzt feiern!";
return;
}

let seconds=Math.floor(diff/1000);

let months=Math.floor(seconds/(60*60*24*30));
seconds-=months*(60*60*24*30);

// 👉 NEU: Monate → Jahre umrechnen
let years=Math.floor(months/12);
months = months % 12;

let weeks=Math.floor(seconds/(60*60*24*7));
seconds-=weeks*(60*60*24*7);

let days=Math.floor(seconds/(60*60*24));
seconds-=days*(60*60*24);

let hours=Math.floor(seconds/(60*60));
seconds-=hours*(60*60);

let minutes=Math.floor(seconds/60);
seconds-=minutes*60;

let parts=[];
if(years>0) parts.push(years+" J");
if(months>0) parts.push(months+" Mo");
if(weeks>0) parts.push(weeks+" Wo");
if(days>0) parts.push(days+" T");
if(hours>0) parts.push(hours+" h");
if(minutes>0) parts.push(minutes+" m");
if(seconds>0) parts.push(seconds+" s");

if(parts.length===0) parts.push("0 s");

digital.innerHTML=parts.join(" • ");

if(i===0){card.classList.add("next");}
if(diff<1000*60*60*24){card.classList.add("warning");}

const key="notified_"+event.name;
if(diff<1000*60*60*24 && !localStorage.getItem(key)){
if(Notification.permission==="granted"){
new Notification("🔔 Erinnerung",{body:event.name+" ist bald!"});
}
localStorage.setItem(key,"yes");
}

});
}

if("Notification" in window){
Notification.requestPermission();
}

render();
setInterval(update,1000);
update();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
